name: Build TPC Site

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.js'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build site
        run: node build.js

      - name: Commit built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html the-work.html iself.html contact.html
          if git diff --staged --quiet; then
            echo "No output changes — skipping commit."
          else
            git commit -m "build: auto-build from src/ [skip ci]"
            git push
          fi
